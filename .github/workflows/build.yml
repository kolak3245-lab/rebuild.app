name: Build APK (Cordova Debug)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" --channel=0

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Add Android Platform
        run: cordova platform add android@13 --save

      - name: Install Core Plugins
        run: |
          cordova plugin add cordova-plugin-whitelist --save || true
          cordova plugin add cordova-plugin-statusbar --save || true
          cordova plugin add cordova-plugin-device --save || true

      - name: Build Debug APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          cordova build android --debug -- --gradleArg=--no-daemon

      - name: Find APK
        run: |
          APK=$(find platforms/android -name "*debug*.apk" | head -1)
          [ -z "$APK" ] && { echo "No APK found!"; exit 1; }
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Found: $APK"
          ls -lh "$APK"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Aplikasi-pro-debug
          path: ${{ env.APK_PATH }}
          retention-days: 90
          if-no-files-found: error